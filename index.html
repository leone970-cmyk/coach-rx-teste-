// ─── UTILS ───────────────────────────────────────────────────────
const fmtMMSS = s => `${String(Math.floor(Math.max(0,s)/60)).padStart(2,"0")}:${String(Math.max(0,s)%60).padStart(2,"0")}`;
const fmtTime = s => { const m=Math.floor(s/60),r=s%60; return m>0?`${m}:${String(r).padStart(2,"0")}`:`${r}s`; };
const toSec = (m,s) => parseInt(m||0)*60+parseInt(s||0);
const round25 = v => Math.round(v/2.5)*2.5;
const uid = () => "ex_" + Date.now() + "_" + Math.random().toString(36).slice(2,6);

const BTNOK={flex:1,padding:13,fontSize:15,borderRadius:10,border:"none",background:"#1a1a1a",color:"#fff",cursor:"pointer",fontWeight:600};

// ─── DB ──────────────────────────────────────────────────────────
function useDB(){
  const [db,setDB]=useState(()=>JSON.parse(JSON.stringify(SEED)));
  const [loaded,setLoaded]=useState(false);
  useEffect(()=>{
    try{const s=localStorage.getItem("coachRX9");if(s)setDB(JSON.parse(s));}catch{}
    setLoaded(true);
  },[]);
  const update=useCallback(fn=>{
    setDB(prev=>{
      const next=JSON.parse(JSON.stringify(prev));
      fn(next);
      try{localStorage.setItem("coachRX9",JSON.stringify(next));}catch{}
      return next;
    });
  },[]);
  return [db,update,loaded];
}

// ─── MODO COACH ──────────────────────────────────────────────────
const COACH_SENHA="1608";
function useModo(){
  const [modo,setModo]=useState(()=>{try{return localStorage.getItem("coachrx_modo")||"aluno";}catch{return "aluno";}});
  const entrar=senha=>{if(senha===COACH_SENHA){setModo("coach");try{localStorage.setItem("coachrx_modo","coach");}catch{}return true;}return false;};

  return [modo,entrar,sair];
}

function TimerItem({timer}){
  const [cur,setCur]=useState(timer);
  const [run,setRun]=useState(false);
  const iv=useRef(null);
  const toggle=()=>{
    if(run){clearInterval(iv.current);setRun(false);}
    else{let c=cur<=0?timer:cur;setCur(c);setRun(true);iv.current=setInterval(()=>{c--;setCur(c);if(c<=0){clearInterval(iv.current);setRun(false);}},1000);}
  };
  useEffect(()=>()=>clearInterval(iv.current),[]);
  return(
    <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
      <span style={{fontSize:14,fontWeight:700,fontVariantNumeric:"tabular-nums",minWidth:44}}>{fmtTime(cur)}</span>
      <button onClick={toggle} style={{padding:"5px 12px",fontSize:12,borderRadius:8,border:"none",background:"#1a1a1a",color:"#fff",cursor:"pointer"}}>{run?"Pausar":"Iniciar"}</button>
      <button onClick={()=>{clearInterval(iv.current);setRun(false);setCur(timer);}} style={{padding:"5px 10px",fontSize:12,border:"1px solid #e0e0dc",borderRadius:8,background:"#fff",color:"#bbb",cursor:"pointer"}}>Reset</button>
    </div>
  );
}

function PRBadge({prKey,pcts,reps,prs}){
  if(!prKey||!prs)return null;
  const pr=prs[prKey];
  if(!pr||!pr.valor)return(<div style={{fontSize:11,color:"#bbb",fontStyle:"italic",marginTop:4}}>PR nao cadastrado — va em PRs para registrar</div>);
  if(pr.unidade==="seg"){
    const isA=prKey==="assault";
    const pace500=!isA&&pr.dist?Math.round(pr.valor/(pr.dist/500)):0;
    const calMin=isA&&pr.cal?(pr.cal/(pr.valor/60)):0;
    const alvoSec=pr.alvoTempo||0;const alvoPct=pr.alvoPct||5;
    const p5Alvo=pace500>0?(alvoSec>0?Math.round(alvoSec/(pr.dist/500)):Math.round(pace500*(1-alvoPct/100))):0;
    const cpmAlvo=calMin>0?(alvoSec>0?(pr.cal/(alvoSec/60)):calMin*(1+alvoPct/100)):0;
    return(
      <div style={{background:"#f5f5f3",borderRadius:8,padding:"8px 10px",marginTop:6,fontSize:12}}>
        <div style={{fontWeight:600,marginBottom:4}}>{pr.nome}: {isA?`${pr.cal||"?"}cal em ${fmtMMSS(pr.valor)}`:fmtMMSS(pr.valor)}{pr.dist?` (${pr.dist}m)`:""}</div>
        {!isA&&pace500>0&&<div style={{display:"flex",gap:12,color:"#555"}}><span>Pace/500m: <strong>{fmtMMSS(pace500)}</strong></span><span style={{color:"#2a7a4b"}}>Alvo: <strong>{fmtMMSS(p5Alvo)}</strong></span></div>}
        {isA&&calMin>0&&<div style={{display:"flex",gap:12,color:"#555"}}><span>cal/min: <strong>{calMin.toFixed(1)}</strong></span><span style={{color:"#2a7a4b"}}>Alvo: <strong>{cpmAlvo.toFixed(1)}</strong></span></div>}
      </div>
    );
  }
  if(pcts&&pcts.length)return(
    <div style={{background:"#f5f5f3",borderRadius:8,padding:"8px 10px",marginTop:6,fontSize:12}}>
      <div style={{fontWeight:600,marginBottom:4}}>Base: {pr.valor} kg (1RM)</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{pcts.map((p,i)=><span key={p} style={{background:"#fff",border:"1px solid #e0e0dc",borderRadius:6,padding:"2px 7px"}}>{reps?.[i]??"-"}x @ {p}% = {round25(pr.valor*p/100)}kg</span>)}</div>
    </div>
  );
  return(<div style={{fontSize:12,color:"#555",marginTop:4}}>PR: {pr.valor} {pr.unidade}</div>);
}

      {!isCoach&&fase==="concluindo"&&(

          </div>
          <Field label="Observacoes"><textarea value={obs} onChange={e=>setObs(e.target.value)} placeholder="Sensacoes, estrategia..." style={{...INP,height:70,resize:"none"}}/></Field>

            {reg.distancia&&<span style={{fontSize:12,background:"#fff",border:"1px solid #b5dcc7",borderRadius:6,padding:"3px 9px"}}>📏 {reg.distancia}</span>}
            {reg.rpe&&<span style={{fontSize:12,background:"#fff",border:"1px solid #b5dcc7",borderRadius:6,padding:"3px 9px"}}>💪 RPE {reg.rpe}/10</span>}
          </div>

          <button onClick={desfazer} style={{marginTop:8,fontSize:11,color:"#ccc",background:"none",border:"none",padding:0,cursor:"pointer"}}>desfazer</button>
        </div>

  );
}

function TreinosTab({db,update,isCoach}){
  const [selAluno,setSelAluno]=useState(db.alunos[0]?.id);
  const [selSemana,setSelSemana]=useState((db.semanas[db.alunos[0]?.id]||[])[0]?.id||null);
  const [selDia,setSelDia]=useState(null);
  const dias=selSemana?db.dias[selSemana]||[]:[];
  const getProg=dId=>{const sss=db.sessoes[dId]||[];return{t:sss.length,d:sss.filter(ss=>db.done[`ss_done_${ss.id}`]).length};};
  const prs=db.prs?.[selAluno]||{};
  const semAtual=db.semanas[selAluno]?.find(s=>(db.dias[s.id]||[]).some(d=>d.id===selDia));
  return(
    <div>
      {isCoach&&<div style={{background:"#fffbf0",border:"1px solid #f0d080",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:16}}>✏️</span><span style={{fontSize:12,color:"#8a6a00"}}>Modo Coach ativo — voce pode editar descricoes e exercicios de cada sessao abaixo.</span></div>}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>{db.alunos.map(a=>(<Pill key={a.id} label={a.nome} active={selAluno===a.id} onClick={()=>{setSelAluno(a.id);setSelSemana((db.semanas[a.id]||[])[0]?.id||null);setSelDia(null);}}/>))}</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>{(db.semanas[selAluno]||[]).map(s=>(<Pill key={s.id} label={s.nome} active={selSemana===s.id} onClick={()=>{setSelSemana(s.id);setSelDia(null);}}/>))}</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {dias.map(d=>{
          const{t,d:dn}=getProg(d.id);
          const pct=t?Math.round((dn/t)*100):0;
          const aberto=selDia===d.id;
          const sessoes=db.sessoes[d.id]||[];
          return(
            <div key={d.id} style={{background:"#fff",border:aberto?"2px solid #1a1a1a":"1px solid #e8e8e5",borderRadius:14,overflow:"hidden"}}>
              <div onClick={()=>setSelDia(aberto?null:d.id)} style={{padding:"13px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
                <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700}}>{d.nome}</div>{d.foco&&<div style={{fontSize:12,color:"#888",marginTop:2}}>{d.foco}</div>}</div>
                <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
                  {!isCoach&&<div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700,color:pct===100&&t>0?"#2a7a4b":"#1a1a1a"}}>{pct}%</div><div style={{fontSize:10,color:"#bbb"}}>{dn}/{t}</div></div>}
                  <div style={{fontSize:16,color:"#bbb",transition:"transform .2s",transform:aberto?"rotate(180deg)":"none"}}>▾</div>
                </div>
              </div>
              <div style={{height:3,background:"#f0f0ee"}}><div style={{height:"100%",width:`${pct}%`,background:"#2a7a4b",transition:"width .3s"}}/></div>
              {aberto&&(
                <div>
                  {semAtual?.obs&&<div style={{padding:"8px 14px",background:"#fffbf0",borderBottom:"1px solid #f0e8c0",display:"flex",gap:8,alignItems:"center"}}><span>📋</span><span style={{fontSize:12,color:"#8a6a00"}}>{semAtual.obs}</span></div>}
                  {!isCoach&&dn===t&&t>0&&<div style={{padding:"10px 14px",background:"#edf7f2",display:"flex",gap:8,alignItems:"center",borderBottom:"1px solid #c8ead4"}}><span style={{fontSize:16}}>🎉</span><span style={{fontSize:13,fontWeight:600,color:"#2a7a4b"}}>Treino do dia concluido!</span></div>}
                  {sessoes.map(ss=>(<SessaoBlock key={ss.id} ss={ss} exs={db.exercicios[ss.id]||[]} db={db} update={update} prs={prs} isCoach={isCoach}/>))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

const PR_DEFS={
  back_squat:{nome:"Back Squat 1RM",unidade:"kg",icon:"🏋️"},
  deadlift:{nome:"Deadlift 1RM",unidade:"kg",icon:"⬆️"},
  front_squat:{nome:"Front Squat 1RM",unidade:"kg",icon:"🏋️"},
  press:{nome:"Shoulder Press 1RM",unidade:"kg",icon:"💪"},
  remo:{nome:"Remo",unidade:"seg",icon:"🚣"},
  ski:{nome:"SkiErg",unidade:"seg",icon:"⛷"},
  assault:{nome:"Assault Bike",unidade:"seg",icon:"🚴"},
};

function PRsTab({db,update}){
  const [selAluno,setSelAluno]=useState(db.alunos[0]?.id);
  const [editKey,setEditKey]=useState(null);
  const [vKg,setVKg]=useState("");
  const [vMM,setVMM]=useState("");const [vSS,setVSS]=useState("");
  const [vDist,setVDist]=useState("");const [vCal,setVCal]=useState("");
  const [alvoTipo,setAlvoTipo]=useState("pct");const [alvoPct,setAlvoPct]=useState("5");
  const [alvoMM,setAlvoMM]=useState("");const [alvoSS,setAlvoSS]=useState("");
  const [vProt,setVProt]=useState("");
  const prs=db.prs?.[selAluno]||{};
  const def=editKey?PR_DEFS[editKey]:null;
  const isTimePR=def?.unidade==="seg";
  const isAssaultPR=editKey==="assault";
  const openEdit=(key,pr)=>{setEditKey(key);if(PR_DEFS[key].unidade==="kg"){setVKg(pr?.valor?String(pr.valor):"");}else{setVMM(pr?.valor?String(Math.floor(pr.valor/60)):"");setVSS(pr?.valor?String(pr.valor%60):"");setVDist(pr?.dist?String(pr.dist):"");setVCal(pr?.cal?String(pr.cal):"");setAlvoTipo(pr?.alvoTipo||"pct");setAlvoPct(String(pr?.alvoPct||5));setAlvoMM(pr?.alvoTempo?String(Math.floor(pr.alvoTempo/60)):"");setAlvoSS(pr?.alvoTempo?String(pr.alvoTempo%60):"");setVProt(pr?.protocolo||"");}};
  const closeEdit=()=>setEditKey(null);
  const savePR=()=>{
    if(def.unidade==="kg"){const val=parseFloat(vKg);if(!val)return;update(d=>{if(!d.prs[selAluno])d.prs[selAluno]={};d.prs[selAluno][editKey]={valor:val,unidade:"kg",nome:def.nome};});}
    else{const sec=toSec(vMM,vSS);if(!sec)return;const isA=editKey==="assault";update(d=>{if(!d.prs[selAluno])d.prs[selAluno]={};d.prs[selAluno][editKey]={valor:sec,unidade:"seg",nome:def.nome,dist:!isA?(parseInt(vDist)||undefined):undefined,cal:isA?(parseInt(vCal)||undefined):undefined,alvoTipo,alvoPct:alvoTipo==="pct"?parseInt(alvoPct)||5:undefined,alvoTempo:alvoTipo==="tempo"?(toSec(alvoMM,alvoSS)||undefined):undefined,protocolo:isA?(vProt.trim()||undefined):undefined};});}
    closeEdit();
  };
  const previewSec=toSec(vMM,vSS);
  const previewPace=!isAssaultPR&&previewSec&&parseInt(vDist)?Math.round(previewSec/(parseInt(vDist)/500)):0;
  const previewCPM=isAssaultPR&&previewSec&&parseInt(vCal)?(parseInt(vCal)/(previewSec/60)):0;
  return(
    <div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>{db.alunos.map(a=><Pill key={a.id} label={a.nome} active={selAluno===a.id} onClick={()=>setSelAluno(a.id)}/>)}</div>
      <div style={{fontSize:12,fontWeight:700,color:"#aaa",textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>Cargas — 1RM</div>
      {["back_squat","deadlift","front_squat","press"].map(key=>{
        const d=PR_DEFS[key];const pr=prs[key];const val=pr?.valor||0;
        return(
          <div key={key} style={{...CARD,padding:"12px 14px",display:"flex",alignItems:"flex-start",gap:12}}>
            <div style={{fontSize:26,width:36,textAlign:"center",paddingTop:2}}>{d.icon}</div>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600}}>{d.nome}</div>{val>0?(<><div style={{fontSize:20,fontWeight:700,color:"#2a7a4b",marginTop:2}}>{val} kg</div><div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:6}}>{[40,50,55,60,65,70,75,80,85,90].map(p=><span key={p} style={{fontSize:11,background:"#f0f0ee",borderRadius:6,padding:"2px 7px",color:"#555"}}>{p}%={round25(val*p/100)}kg</span>)}</div></>):<div style={{fontSize:12,color:"#bbb",marginTop:2}}>Nao cadastrado</div>}</div>
            <button onClick={()=>openEdit(key,pr)} style={{padding:"7px 14px",fontSize:13,borderRadius:10,border:"1px solid #e8e8e5",background:"#fff",color:"#1a1a1a",cursor:"pointer",flexShrink:0}}>{val>0?"Editar":"+ PR"}</button>
          </div>
        );
      })}
      <div style={{fontSize:12,fontWeight:700,color:"#aaa",textTransform:"uppercase",letterSpacing:".08em",marginBottom:10,marginTop:4}}>Maquinas</div>
      {["remo","ski","assault"].map(key=>{
        const d=PR_DEFS[key];const pr=prs[key];const val=pr?.valor||0;
        const isA=key==="assault";
        const pace500=val&&!isA&&pr?.dist?Math.round(val/(pr.dist/500)):0;
        const calMin=val&&isA&&pr?.cal?(pr.cal/(val/60)):0;
        const alvoSec=pr?.alvoTempo||0;const alvoPctV=pr?.alvoPct||5;
        const p5Alvo=pace500>0?(alvoSec>0?Math.round(alvoSec/(pr.dist/500)):Math.round(pace500*(1-alvoPctV/100))):0;
        const cpmAlvo=calMin>0?(alvoSec>0?(pr.cal/(alvoSec/60)):calMin*(1+alvoPctV/100)):0;
        const protocolo=(pr?.protocolo||"").split(",").map(s=>parseInt(s.trim())).filter(n=>!isNaN(n)&&n>0);
        const abAlvoSec=cpmAlvo&&pr?.cal?(pr.cal/cpmAlvo)*60:0;
        return(
          <div key={key} style={{...CARD,padding:"12px 14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:val>0?12:0}}>
              <div style={{fontSize:26,width:36,textAlign:"center"}}>{d.icon}</div>
              <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600}}>{d.nome}</div>{val>0?<div style={{fontSize:18,fontWeight:700,color:"#2a7a4b",marginTop:1}}>{isA?`${pr?.cal||"?"}cal em `:""}{fmtMMSS(val)}{!isA&&pr?.dist?<span style={{fontSize:12,fontWeight:400,color:"#888",marginLeft:6}}>({pr.dist}m)</span>:null}</div>:<div style={{fontSize:12,color:"#bbb",marginTop:2}}>Nao cadastrado</div>}</div>
              <button onClick={()=>openEdit(key,pr)} style={{padding:"7px 14px",fontSize:13,borderRadius:10,border:"1px solid #e8e8e5",background:"#fff",color:"#1a1a1a",cursor:"pointer",flexShrink:0}}>{val>0?"Editar":"+ PR"}</button>
            </div>
            {val>0&&!isA&&pace500>0&&(
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                {[{l:"Pace/500m",v:fmtMMSS(pace500),g:false},{l:"Alvo",v:fmtMMSS(p5Alvo),g:true},{l:"Z2 (+10%)",v:fmtMMSS(Math.round(pace500*1.1)),g:false}].map(x=>(
                  <div key={x.l} style={{background:x.g?"rgba(42,122,75,.1)":"#f5f5f3",borderRadius:8,padding:"8px",textAlign:"center"}}>
                    <div style={{fontSize:10,color:x.g?"#2a7a4b":"#888"}}>{x.l}</div>
                    <div style={{fontSize:14,fontWeight:700,color:x.g?"#2a7a4b":"#1a1a1a"}}>{x.v}</div>
                  </div>
                ))}
              </div>
            )}
            {val>0&&isA&&calMin>0&&(
              <div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                  <div style={{background:"#f5f5f3",borderRadius:10,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:11,color:"#888"}}>Atual</div><div style={{fontSize:22,fontWeight:700}}>{calMin.toFixed(1)}</div><div style={{fontSize:11,color:"#888"}}>{pr.cal}cal em {fmtMMSS(val)}</div></div>
                  <div style={{background:"#edf7f2",border:"1px solid #b5dcc7",borderRadius:10,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:11,color:"#2a7a4b"}}>Alvo</div><div style={{fontSize:22,fontWeight:700,color:"#2a7a4b"}}>{cpmAlvo.toFixed(1)}</div><div style={{fontSize:11,color:"#2a7a4b"}}>{pr.cal}cal em {fmtMMSS(Math.round(abAlvoSec))}</div></div>
                </div>
                {protocolo.length>0&&protocolo.map((c,i)=>{const tA=cpmAlvo>0?Math.round(c/cpmAlvo*60):0;return(<div key={i} style={{display:"flex",justifyContent:"space-between",background:"#f5f5f3",borderRadius:8,padding:"7px 10px",marginBottom:4}}><span style={{fontSize:13,color:"#555"}}>Round {i+1} <span style={{fontWeight:700,color:"#2a7a4b"}}>{c} cal</span></span><span style={{fontSize:14,fontWeight:700}}>{tA>0?fmtMMSS(tA):"—"}</span></div>);})}
              </div>
            )}
          </div>
        );
      })}
      <Sheet open={!!editKey&&!isTimePR} onClose={closeEdit} title={`PR — ${def?.nome||""}`}>
        <Field label="Carga 1RM (kg)"><input style={INP} value={vKg} onChange={e=>setVKg(e.target.value)} inputMode="decimal" placeholder="Ex: 90"/></Field>
        {vKg&&!isNaN(parseFloat(vKg))&&<div style={{background:"#f5f5f3",borderRadius:10,padding:"10px 12px",marginBottom:14,display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>{[40,50,55,60,65,70,75,80,85,90].map(p=><div key={p} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"3px 6px"}}><span style={{color:"#888"}}>{p}%</span><span style={{fontWeight:700}}>{round25(parseFloat(vKg)*p/100)} kg</span></div>)}</div>}
        <div style={{display:"flex",gap:8}}><button style={BTNCANCEL} onClick={closeEdit}>Cancelar</button><button style={BTNOK} onClick={savePR}>Salvar</button></div>
      </Sheet>
      <Sheet open={!!editKey&&isTimePR} onClose={closeEdit} title={`PR — ${def?.nome||""}`}>
        {!isAssaultPR&&<Field label="Distancia (m)"><input style={INP} value={vDist} onChange={e=>setVDist(e.target.value)} inputMode="numeric" placeholder="Ex: 2000"/></Field>}
        {isAssaultPR&&<Field label="Calorias realizadas"><input style={INP} value={vCal} onChange={e=>setVCal(e.target.value)} inputMode="numeric" placeholder="Ex: 50"/></Field>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Field label="Tempo (mm)"><input style={INP} value={vMM} onChange={e=>setVMM(e.target.value)} inputMode="numeric" placeholder="7"/></Field>
          <Field label="Tempo (ss)"><input style={INP} value={vSS} onChange={e=>setVSS(e.target.value)} inputMode="numeric" placeholder="30"/></Field>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"#aaa",marginBottom:8}}>Melhora alvo</div>
          <div style={{display:"flex",gap:6,marginBottom:10}}>

        </div>
        {isAssaultPR&&<Field label="Protocolo (cal por round, separados por virgula)"><input style={INP} value={vProt} onChange={e=>setVProt(e.target.value)} placeholder="Ex: 12,11,10,9,8,7,6,5"/></Field>}
        {previewSec>0&&<div style={{background:"#f5f5f3",borderRadius:10,padding:"10px 12px",marginBottom:14,fontSize:13}}><strong>{fmtMMSS(previewSec)}</strong>{!isAssaultPR&&previewPace>0&&<span style={{color:"#555",marginLeft:10}}>{fmtMMSS(previewPace)}/500m</span>}{isAssaultPR&&previewCPM>0&&<span style={{color:"#555",marginLeft:10}}>{previewCPM.toFixed(1)} cal/min</span>}</div>}
        <div style={{display:"flex",gap:8}}><button style={BTNCANCEL} onClick={closeEdit}>Cancelar</button><button style={BTNOK} onClick={savePR}>Salvar</button></div>
      </Sheet>
    </div>
  );
}

function ProgressoTab({db}){
  return(
    <div>
      {db.alunos.map(a=>{
        const sems=db.semanas[a.id]||[];let te=0,de=0;
        sems.forEach(s=>(db.dias[s.id]||[]).forEach(d=>{const sss=db.sessoes[d.id]||[];te+=sss.length;de+=sss.filter(ss=>db.done[`ss_done_${ss.id}`]).length;}));
        return(
          <div key={a.id} style={{...CARD,padding:0,overflow:"hidden"}}>
            <div style={{padding:"14px 16px",borderBottom:"1px solid #f2f2f0"}}><div style={{fontSize:16,fontWeight:700}}>{a.nome}</div>{a.objetivo&&<div style={{fontSize:13,color:"#888",marginTop:2}}>Objetivo: {a.objetivo}</div>}</div>
            <div style={{padding:"14px 16px"}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
                {[{n:sems.length,l:"Semanas"},{n:te,l:"Sessoes"},{n:te?Math.round((de/te)*100)+"%":"0%",l:"Concluido"}].map(s=>(<div key={s.l} style={{background:"#f5f5f3",borderRadius:10,padding:10,textAlign:"center"}}><div style={{fontSize:24,fontWeight:700}}>{s.n}</div><div style={{fontSize:11,color:"#888",marginTop:2}}>{s.l}</div></div>))}
              </div>
              {sems.map(s=>{let st=0,sd=0;(db.dias[s.id]||[]).forEach(d=>{const sss=db.sessoes[d.id]||[];st+=sss.length;sd+=sss.filter(ss=>db.done[`ss_done_${ss.id}`]).length;});return(<div key={s.id} style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",fontSize:14,marginBottom:5}}><span style={{fontWeight:600}}>{s.nome}</span><span style={{color:"#888"}}>{sd}/{st}</span></div><ProgBar done={sd} total={st} height={5}/></div>);})}
            </div>
          </div>
        );
      })}
    </div>
  );
}

const ESTACOES=[
  {id:"ski",nome:"SkiErg",dist:"1000m",icone:"⛷"},{id:"sled_push",nome:"Sled Push",dist:"50m",icone:"🛷"},
  {id:"sled_pull",nome:"Sled Pull",dist:"50m",icone:"🔗"},{id:"burpee",nome:"Burpee Broad Jump",dist:"80m",icone:"🏃"},
  {id:"row",nome:"Rowing",dist:"1000m",icone:"🚣"},{id:"farmers",nome:"Farmer's Carry",dist:"200m",icone:"💪"},
  {id:"lunge",nome:"Sandbag Lunge",dist:"100m",icone:"🎒"},{id:"wallball",nome:"Wall Ball",dist:"100 reps",icone:"🏀"},
];

function HyroxTab(){
  const KEY="hyroxM10";
  const [data,setData]=useState(()=>{try{const s=localStorage.getItem(KEY);return s?JSON.parse(s):{};}catch{return{};}});
  const [edit,setEdit]=useState(null);const [mm,setMM]=useState("");const [ss,setSS]=useState("");
  const save=id=>{const sec=toSec(mm,ss);if(!sec)return;const n={...data,[id]:{tempo:sec}};setData(n);try{localStorage.setItem(KEY,JSON.stringify(n));}catch{}setEdit(null);setMM("");setSS("");};
  const total=Object.values(data).reduce((a,v)=>a+(v?.tempo||0),0);
  return(
    <div>
      <div style={{...CARD,background:"#1a1a1a",color:"#fff",textAlign:"center",padding:"20px 16px"}}>
        <div style={{fontSize:11,color:"#666",marginBottom:4,textTransform:"uppercase",letterSpacing:".1em"}}>Tempo Total Estimado</div>
        <div style={{fontSize:42,fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{fmtMMSS(total)}</div>
        <div style={{fontSize:12,color:"#555",marginTop:4}}>{Object.keys(data).length}/8 estacoes</div>
      </div>
      {ESTACOES.map(e=>{
        const sec=data[e.id]?.tempo||0;
        return(
          <div key={e.id} style={{...CARD,display:"flex",alignItems:"center",gap:12,padding:"12px 14px"}}>
            <div style={{fontSize:28,width:40,textAlign:"center"}}>{e.icone}</div>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600}}>{e.nome}</div><div style={{fontSize:11,color:"#888"}}>{e.dist}</div>{sec>0&&<div style={{fontSize:14,color:"#2a7a4b",fontWeight:700,marginTop:2}}>{fmtMMSS(sec)}</div>}</div>
            {edit===e.id?(
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                <input value={mm} onChange={x=>setMM(x.target.value)} placeholder="mm" inputMode="numeric" style={{...INP,width:48,textAlign:"center",fontSize:14,padding:"6px 8px"}}/>
                <span>:</span>
                <input value={ss} onChange={x=>setSS(x.target.value)} placeholder="ss" inputMode="numeric" style={{...INP,width:48,textAlign:"center",fontSize:14,padding:"6px 8px"}}/>
                <button onClick={()=>save(e.id)} style={{padding:"7px 12px",fontSize:13,borderRadius:8,border:"none",background:"#1a1a1a",color:"#fff",cursor:"pointer"}}>OK</button>
              </div>
            ):(
              <button onClick={()=>{setEdit(e.id);if(sec){setMM(String(Math.floor(sec/60)));setSS(String(sec%60));}}} style={{padding:"7px 14px",fontSize:13,borderRadius:8,border:"1px solid #e8e8e5",background:"#fff",color:"#1a1a1a",cursor:"pointer",whiteSpace:"nowrap"}}>{sec>0?"Editar":"+ Tempo"}</button>
            )}
          </div>
        );
      })}
    </div>
  );
}

const PACE_DUR=[
  {label:"12 min",sec:720},{label:"10 min",sec:600},{label:"8 min",sec:480},{label:"6 min",sec:360},
  {label:"4 min",sec:240},{label:"3 min",sec:180},{label:"2 min",sec:120},{label:"1m30",sec:90},
  {label:"1 min",sec:60},{label:"45s",sec:45},{label:"30s",sec:30},{label:"15s",sec:15},
];

function PaceTab(){
  const [modo,setModo]=useState("remo");
  const [mm,setMM]=useState("");const [ss,setSS]=useState("");const [dist,setDist]=useState("");
  const [alvoTipo,setAlvoTipo]=useState("pct");const [pct,setPct]=useState("5");
  const [alvoMM,setAlvoMM]=useState("");const [alvoSS,setAlvoSS]=useState("");
  const [abCal,setAbCal]=useState("");const [abMM,setAbMM]=useState("");const [abSS,setAbSS]=useState("");
  const [abAlvoTipo,setAbAlvoTipo]=useState("pct");const [abPct,setAbPct]=useState("5");
  const [abAlvoMM,setAbAlvoMM]=useState("");const [abAlvoSS,setAbAlvoSS]=useState("");
  const baseSec=toSec(mm,ss);const baseDistM=parseInt(dist)||0;
  const basePace500=baseSec&&baseDistM?(baseSec/(baseDistM/500)):0;
  const alvoSec2=alvoTipo==="tempo"?toSec(alvoMM,alvoSS):0;
  const alvo=basePace500>0?(alvoSec2>0?(alvoSec2/(baseDistM/500)):basePace500*(1-parseInt(pct||0)/100)):0;
  const abSec=toSec(abMM,abSS);const abTargetCal=parseInt(abCal)||0;
  const abCPM=abSec&&abTargetCal?(abTargetCal/(abSec/60)):0;
  const abAlvoSec2=abAlvoTipo==="tempo"?toSec(abAlvoMM,abAlvoSS):0;
  const abCPMAlvo=abCPM>0?(abAlvoSec2>0?(abTargetCal/(abAlvoSec2/60)):abCPM*(1+parseInt(abPct||0)/100)):0;
  const abAlvoSecFinal=abCPMAlvo?(abTargetCal/abCPMAlvo)*60:0;
  return(
    <div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
        {[{id:"remo",l:"Remo"},{id:"ski",l:"SkiErg"},{id:"assault",l:"Assault Bike"}].map(m=>(<Pill key={m.id} label={m.l} active={modo===m.id} onClick={()=>setModo(m.id)}/>))}
      </div>
      {(modo==="remo"||modo==="ski")&&(
        <div>
          <div style={CARD}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>Resultado do teste</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
              <Field label="Distancia (m)"><input style={INP} value={dist} onChange={e=>setDist(e.target.value)} inputMode="numeric" placeholder="2000"/></Field>
              <Field label="Tempo (mm)"><input style={INP} value={mm} onChange={e=>setMM(e.target.value)} inputMode="numeric" placeholder="7"/></Field>
              <Field label="Tempo (ss)"><input style={INP} value={ss} onChange={e=>setSS(e.target.value)} inputMode="numeric" placeholder="30"/></Field>
            </div>
            <div style={{fontSize:12,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"#aaa",marginBottom:8}}>Melhora alvo</div>
            <div style={{display:"flex",gap:6,marginBottom:10}}>
              <button onClick={()=>setAlvoTipo("pct")} style={{flex:1,padding:"9px 0",fontSize:13,borderRadius:10,border:"none",background:alvoTipo==="pct"?"#1a1a1a":"#f0f0ee",color:alvoTipo==="pct"?"#fff":"#888",cursor:"pointer"}}>Por %</button>
              <button onClick={()=>setAlvoTipo("tempo")} style={{flex:1,padding:"9px 0",fontSize:13,borderRadius:10,border:"none",background:alvoTipo==="tempo"?"#1a1a1a":"#f0f0ee",color:alvoTipo==="tempo"?"#fff":"#888",cursor:"pointer"}}>Por tempo</button>
            </div>
            {alvoTipo==="pct"&&<div style={{display:"flex",alignItems:"center",gap:10}}><input style={{...INP,width:80,textAlign:"center"}} value={pct} onChange={e=>setPct(e.target.value)} inputMode="numeric" placeholder="5"/><span style={{fontSize:14,color:"#888"}}>% de melhora</span></div>}
            {alvoTipo==="tempo"&&<div style={{display:"flex",gap:8,alignItems:"center"}}><input style={{...INP,width:70,textAlign:"center"}} value={alvoMM} onChange={e=>setAlvoMM(e.target.value)} inputMode="numeric" placeholder="mm"/><span style={{color:"#888"}}>:</span><input style={{...INP,width:70,textAlign:"center"}} value={alvoSS} onChange={e=>setAlvoSS(e.target.value)} inputMode="numeric" placeholder="ss"/><span style={{fontSize:13,color:"#888"}}>tempo alvo</span></div>}
          </div>
          {basePace500>0&&alvo>0&&(
            <div style={CARD}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>{modo==="ski"?"SkiErg":"Remo"} — Pace/500m</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                <div style={{background:"#f5f5f3",borderRadius:10,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:11,color:"#888"}}>Atual</div><div style={{fontSize:26,fontWeight:700}}>{fmtMMSS(Math.round(basePace500))}</div></div>
                <div style={{background:"#edf7f2",border:"1px solid #b5dcc7",borderRadius:10,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:11,color:"#2a7a4b"}}>Alvo</div><div style={{fontSize:26,fontWeight:700,color:"#2a7a4b"}}>{fmtMMSS(Math.round(alvo))}</div></div>
              </div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr>{["Duracao","Dist Atual","Dist Alvo"].map(h=><th key={h} style={{textAlign:"left",padding:"5px 6px",color:"#888",fontWeight:600,fontSize:11,borderBottom:"1px solid #f0f0ee"}}>{h}</th>)}</tr></thead>
                <tbody>{PACE_DUR.map(t=>{const dA=Math.round(t.sec/basePace500*500);const dAl=Math.round(t.sec/alvo*500);return(<tr key={t.sec} style={{borderBottom:"1px solid #f8f8f6"}}><td style={{padding:"6px 6px",fontWeight:500}}>{t.label}</td><td style={{padding:"6px 6px",color:"#555"}}>{dA}m</td><td style={{padding:"6px 6px",color:"#2a7a4b",fontWeight:600}}>{dAl}m</td></tr>);})}</tbody>
              </table>
            </div>
          )}
        </div>
      )}
      {modo==="assault"&&(
        <div>
          <div style={CARD}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>Assault Bike</div>
            <div style={{fontSize:12,color:"#888",marginBottom:12}}>Tempo para atingir X calorias</div>
            <Field label="Calorias realizadas"><input style={INP} value={abCal} onChange={e=>setAbCal(e.target.value)} inputMode="numeric" placeholder="50"/></Field>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <Field label="Tempo (mm)"><input style={INP} value={abMM} onChange={e=>setAbMM(e.target.value)} inputMode="numeric" placeholder="1"/></Field>
              <Field label="Tempo (ss)"><input style={INP} value={abSS} onChange={e=>setAbSS(e.target.value)} inputMode="numeric" placeholder="45"/></Field>
            </div>
            <div style={{fontSize:12,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"#aaa",marginBottom:8}}>Melhora alvo</div>
            <div style={{display:"flex",gap:6,marginBottom:10}}>
              <button onClick={()=>setAbAlvoTipo("pct")} style={{flex:1,padding:"9px 0",fontSize:13,borderRadius:10,border:"none",background:abAlvoTipo==="pct"?"#1a1a1a":"#f0f0ee",color:abAlvoTipo==="pct"?"#fff":"#888",cursor:"pointer"}}>Por %</button>
              <button onClick={()=>setAbAlvoTipo("tempo")} style={{flex:1,padding:"9px 0",fontSize:13,borderRadius:10,border:"none",background:abAlvoTipo==="tempo"?"#1a1a1a":"#f0f0ee",color:abAlvoTipo==="tempo"?"#fff":"#888",cursor:"pointer"}}>Por tempo</button>
            </div>
            {abAlvoTipo==="pct"&&<div style={{display:"flex",alignItems:"center",gap:10}}><input style={{...INP,width:80,textAlign:"center"}} value={abPct} onChange={e=>setAbPct(e.target.value)} inputMode="numeric" placeholder="5"/><span style={{fontSize:14,color:"#888"}}>% de melhora</span></div>}
            {abAlvoTipo==="tempo"&&<div style={{display:"flex",gap:8,alignItems:"center"}}><input style={{...INP,width:70,textAlign:"center"}} value={abAlvoMM} onChange={e=>setAbAlvoMM(e.target.value)} inputMode="numeric" placeholder="mm"/><span style={{color:"#888"}}>:</span><input style={{...INP,width:70,textAlign:"center"}} value={abAlvoSS} onChange={e=>setAbAlvoSS(e.target.value)} inputMode="numeric" placeholder="ss"/><span style={{fontSize:13,color:"#888"}}>tempo alvo</span></div>}
          </div>
          {abSec>0&&abCPM>0&&(
            <div style={CARD}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                <div style={{background:"#f5f5f3",borderRadius:10,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:11,color:"#888"}}>Atual</div><div style={{fontSize:24,fontWeight:700}}>{abCPM.toFixed(1)}</div><div style={{fontSize:11,color:"#888"}}>{abTargetCal}cal em {fmtMMSS(abSec)}</div></div>
                <div style={{background:"#edf7f2",border:"1px solid #b5dcc7",borderRadius:10,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:11,color:"#2a7a4b"}}>Alvo</div><div style={{fontSize:24,fontWeight:700,color:"#2a7a4b"}}>{abCPMAlvo.toFixed(1)}</div><div style={{fontSize:11,color:"#2a7a4b"}}>{abTargetCal}cal em {fmtMMSS(Math.round(abAlvoSecFinal))}</div></div>
              </div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr>{["Duracao","Atual","Alvo"].map(h=><th key={h} style={{textAlign:"left",padding:"5px 6px",color:"#888",fontWeight:600,fontSize:11,borderBottom:"1px solid #f0f0ee"}}>{h}</th>)}</tr></thead>
                <tbody>{[{l:"30s",s:30},{l:"45s",s:45},{l:"1 min",s:60},{l:"2 min",s:120},{l:"4 min",s:240},{l:"6 min",s:360},{l:"8 min",s:480},{l:"10 min",s:600},{l:"12 min",s:720}].map(t=>(<tr key={t.s} style={{borderBottom:"1px solid #f8f8f6"}}><td style={{padding:"5px 6px",fontWeight:500}}>{t.l}</td><td style={{padding:"5px 6px",color:"#555"}}>{Math.round(abCPM*(t.s/60))}</td><td style={{padding:"5px 6px",color:"#2a7a4b",fontWeight:600}}>{Math.round(abCPMAlvo*(t.s/60))}</td></tr>))}</tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ═══ APP ═════════════════════════════════════════════════════════
const TABS=[
  {id:"treinos",label:"Treinos",icon:"📋"},
  {id:"prs",label:"PRs",icon:"🏆"},
  {id:"progresso",label:"Progresso",icon:"📈"},
  {id:"hyrox",label:"Hyrox",icon:"⚡"},
  {id:"pace",label:"Pace",icon:"🎯"},
];

function App(){
  const [db,update,loaded]=useDB();
  const [modo,entrar,sair]=useModo();
  const [tab,setTab]=useState("treinos");
  const isCoach=modo==="coach";
  if(!loaded)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontSize:16,color:"#888"}}>Carregando...</div>);
  return(
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <div style={{position:"sticky",top:0,zIndex:100,background:"#fff",borderBottom:"1px solid #e8e8e5",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontSize:18,fontWeight:800,letterSpacing:"-0.5px"}}>Coach RX</div>
        <BotaoModo modo={modo} entrar={entrar} sair={sair}/>
      </div>
      <div style={{flex:1,padding:"16px 14px 100px",overflowY:"auto"}}>
        {tab==="treinos"&&<TreinosTab db={db} update={update} isCoach={isCoach}/>}
        {tab==="prs"&&<PRsTab db={db} update={update}/>}
        {tab==="progresso"&&<ProgressoTab db={db}/>}
        {tab==="hyrox"&&<HyroxTab/>}
        {tab==="pace"&&<PaceTab/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:"1px solid #e8e8e5",display:"flex",zIndex:100}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 4px 14px",border:"none",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:18}}>{t.icon}</span>
            <span style={{fontSize:10,color:tab===t.id?"#1a1a1a":"#bbb",fontWeight:tab===t.id?700:400}}>{t.label}</span>
            {tab===t.id&&<div style={{width:20,height:2,background:"#1a1a1a",borderRadius:1,marginTop:1}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
