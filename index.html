function useDB(){
  const[db,setDB]=useState(()=>JSON.parse(JSON.stringify(SEED)));
  const[loaded,setLoaded]=useState(false);
  useEffect(()=>{try{const s=localStorage.getItem("coachRX9");if(s)setDB(JSON.parse(s));}catch{}setLoaded(true);},[]);
  const update=useCallback(fn=>{setDB(prev=>{const next=JSON.parse(JSON.stringify(prev));fn(next);try{localStorage.setItem("coachRX9",JSON.stringify(next));}catch{}return next;});},[]);
  return[db,update,loaded];
}

const COACH_SENHA="1608";
function useModo(){
  const[modo,setModo]=useState(()=>{try{return localStorage.getItem("coachrx_modo")||"aluno";}catch{return"aluno";}});
  const entrar=s=>{if(s===COACH_SENHA){setModo("coach");try{localStorage.setItem("coachrx_modo","coach");}catch{}return true;}return false;};
  const sair=()=>{setModo("aluno");try{localStorage.setItem("coachrx_modo","aluno");}catch{}};
  return[modo,entrar,sair];
}

function Field({label,children}){return(<div style={{marginBottom:12}}><div style={{fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"#aaa",marginBottom:5}}>{label}</div>{children}</div>);}
function Pill({label,active,onClick}){return(<button onClick={onClick} style={{padding:"8px 16px",fontSize:13,borderRadius:20,border:"none",background:active?"#1a1a1a":"#eeeeed",color:active?"#fff":"#555",cursor:"pointer",fontWeight:active?600:400}}>{label}</button>);}

function BotaoModo({modo,entrar,sair}){
  const[show,setShow]=useState(false);
  const[senha,setSenha]=useState("");
  const[erro,setErro]=useState(false);
  if(modo==="coach")return(<div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:"#2a7a4b",fontWeight:700}}>● COACH</span><button onClick={sair} style={{fontSize:11,padding:"5px 12px",borderRadius:6,border:"1px solid #444",background:"transparent",color:"#888",cursor:"pointer"}}>Sair</button></div>);

function TimerItem({timer}){
  const[cur,setCur]=useState(timer);const[run,setRun]=useState(false);const iv=useRef(null);
  const toggle=()=>{if(run){clearInterval(iv.current);setRun(false);}else{let c=cur<=0?timer:cur;setCur(c);setRun(true);iv.current=setInterval(()=>{c--;setCur(c);if(c<=0){clearInterval(iv.current);setRun(false);}},1000);}};
  useEffect(()=>()=>clearInterval(iv.current),[]);
  return(<div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}><span style={{fontSize:14,fontWeight:700,minWidth:44}}>{fmtTime(cur)}</span><button onClick={toggle} style={{padding:"5px 12px",fontSize:12,borderRadius:8,border:"none",background:"#1a1a1a",color:"#fff",cursor:"pointer"}}>{run?"Pausar":"Iniciar"}</button><button onClick={()=>{clearInterval(iv.current);setRun(false);setCur(timer);}} style={{padding:"5px 10px",fontSize:12,border:"1px solid #e0e0dc",borderRadius:8,background:"#fff",color:"#bbb",cursor:"pointer"}}>Reset</button></div>);
}

function PRBadge({prKey,pcts,reps,prs}){
  if(!prKey||!prs)return null;
  const pr=prs[prKey];
  if(!pr||!pr.valor)return(<div style={{fontSize:11,color:"#bbb",fontStyle:"italic",marginTop:4}}>PR nao cadastrado</div>);
  if(pr.unidade==="seg"){
    const isA=prKey==="assault";
    const pace500=!isA&&pr.dist?Math.round(pr.valor/(pr.dist/500)):0;
    const calMin=isA&&pr.cal?(pr.cal/(pr.valor/60)):0;
    const alvoSec=pr.alvoTempo||0;const alvoPct=pr.alvoPct||5;
    const p5Alvo=pace500>0?(alvoSec>0?Math.round(alvoSec/(pr.dist/500)):Math.round(pace500*(1-alvoPct/100))):0;
    const cpmAlvo=calMin>0?(alvoSec>0?(pr.cal/(alvoSec/60)):calMin*(1+alvoPct/100)):0;
    return(<div style={{background:"#f5f5f3",borderRadius:8,padding:"8px 10px",marginTop:6,fontSize:12}}><div style={{fontWeight:600,marginBottom:4}}>{pr.nome}: {isA?`${pr.cal||"?"}cal em ${fmtMMSS(pr.valor)}`:fmtMMSS(pr.valor)}{pr.dist?` (${pr.dist}m)`:""}</div>{!isA&&pace500>0&&<div style={{color:"#555"}}>Pace/500m: <strong>{fmtMMSS(pace500)}</strong> → Alvo: <strong style={{color:"#2a7a4b"}}>{fmtMMSS(p5Alvo)}</strong></div>}{isA&&calMin>0&&<div style={{color:"#555"}}>cal/min: <strong>{calMin.toFixed(1)}</strong> → Alvo: <strong style={{color:"#2a7a4b"}}>{cpmAlvo.toFixed(1)}</strong></div>}</div>);
  }
  if(pcts&&pcts.length)return(<div style={{background:"#f5f5f3",borderRadius:8,padding:"8px 10px",marginTop:6,fontSize:12}}><div style={{fontWeight:600,marginBottom:4}}>Base: {pr.valor} kg (1RM)</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{pcts.map((p,i)=><span key={p} style={{background:"#fff",border:"1px solid #e0e0dc",borderRadius:6,padding:"2px 7px"}}>{reps?.[i]??"-"}x@{p}%={round25(pr.valor*p/100)}kg</span>)}</div></div>);
  return(<div style={{fontSize:12,color:"#555",marginTop:4}}>PR: {pr.valor} {pr.unidade}</div>);
}

  const save=id=>{const sec=toSec(mm,ss);if(!sec)return;const n={...data,[id]:{tempo:sec}};setData(n);try{localStorage.setItem(KEY,JSON.stringify(n));}catch{}setEdit(null);setMM("");setSS("");};
  const total=Object.values(data).reduce((a,v)=>a+(v?.tempo||0),0);
  return(<div><div style={{...CARD,background:"#1a1a1a",color:"#fff",textAlign:"center",padding:"20px 16px"}}><div style={{fontSize:11,color:"#666",marginBottom:4,textTransform:"uppercase",letterSpacing:".1em"}}>Tempo Total Estimado</div><div style={{fontSize:42,fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{fmtMMSS(total)}</div><div style={{fontSize:12,color:"#555",marginTop:4}}>{Object.keys(data).length}/8 estacoes</div></div>{ESTACOES.map(e=>{const sec=data[e.id]?.tempo||0;return(<div key={e.id} style={{...CARD,display:"flex",alignItems:"center",gap:12,padding:"12px 14px"}}><div style={{fontSize:28,width:40,textAlign:"center"}}>{e.icone}</div><div style={{flex:1}}><div style={{fontSize:14,fontWeight:600}}>{e.nome}</div><div style={{fontSize:11,color:"#888"}}>{e.dist}</div>{sec>0&&<div style={{fontSize:14,color:"#2a7a4b",fontWeight:700,marginTop:2}}>{fmtMMSS(sec)}</div>}</div>{edit===e.id?(<div style={{display:"flex",gap:4,alignItems:"center"}}><input value={mm} onChange={x=>setMM(x.target.value)} placeholder="mm" inputMode="numeric" style={{...INP,width:48,textAlign:"center",fontSize:14,padding:"6px 8px"}}/><span>:</span><input value={ss} onChange={x=>setSS(x.target.value)} placeholder="ss" inputMode="numeric" style={{...INP,width:48,textAlign:"center",fontSize:14,padding:"6px 8px"}}/><button onClick={()=>save(e.id)} style={{padding:"7px 12px",fontSize:13,borderRadius:8,border:"none",background:"#1a1a1a",color:"#fff",cursor:"pointer"}}>OK</button></div>):(<button onClick={()=>{setEdit(e.id);if(sec){setMM(String(Math.floor(sec/60)));setSS(String(sec%60));}}} style={{padding:"7px 14px",fontSize:13,borderRadius:8,border:"1px solid #e8e8e5",background:"#fff",color:"#1a1a1a",cursor:"pointer",whiteSpace:"nowrap"}}>{sec>0?"Editar":"+ Tempo"}</button>)}</div>);})}</div>);
}

const PACE_DUR=[{label:"12 min",sec:720},{label:"10 min",sec:600},{label:"8 min",sec:480},{label:"6 min",sec:360},{label:"4 min",sec:240},{label:"3 min",sec:180},{label:"2 min",sec:120},{label:"1m30",sec:90},{label:"1 min",sec:60},{label:"45s",sec:45},{label:"30s",sec:30},{label:"15s",sec:15}];

function PaceTab(){
  const[modo,setModo]=useState("remo");const[mm,setMM]=useState("");const[ss,setSS]=useState("");const[dist,setDist]=useState("");const[alvoTipo,setAlvoTipo]=useState("pct");const[pct,setPct]=useState("5");const[alvoMM,setAlvoMM]=useState("");const[alvoSS,setAlvoSS]=useState("");const[abCal,setAbCal]=useState("");const[abMM,setAbMM]=useState("");const[abSS,setAbSS]=useState("");const[abAlvoTipo,setAbAlvoTipo]=useState("pct");const[abPct,setAbPct]=useState("5");const[abAlvoMM,setAbAlvoMM]=useState("");const[abAlvoSS,setAbAlvoSS]=useState("");
  const baseSec=toSec(mm,ss);const baseDistM=parseInt(dist)||0;const basePace500=baseSec&&baseDistM?(baseSec/(baseDistM/500)):0;const alvoSec2=alvoTipo==="tempo"?toSec(alvoMM,alvoSS):0;const alvo=basePace500>0?(alvoSec2>0?(alvoSec2/(baseDistM/500)):basePace500*(1-parseInt(pct||0)/100)):0;const abSec=toSec(abMM,abSS);const abTargetCal=parseInt(abCal)||0;const abCPM=abSec&&abTargetCal?(abTargetCal/(abSec/60)):0;const abAlvoSec2=abAlvoTipo==="tempo"?toSec(abAlvoMM,abAlvoSS):0;const abCPMAlvo=abCPM>0?(abAlvoSec2>0?(abTargetCal/(abAlvoSec2/60)):abCPM*(1+parseInt(abPct||0)/100)):0;const abAlvoSecFinal=abCPMAlvo?(abTargetCal/abCPMAlvo)*60:0;
  return(<div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>{[{id:"remo",l:"Remo"},{id:"ski",l:"SkiErg"},{id:"assault",l:"Assault Bike"}].map(m=>(<Pill key={m.id} label={m.l} active={modo===m.id} onClick={()=>setModo(m.id)}/>))}</div>
    {(modo==="remo"||modo==="ski")&&(<div><div style={CARD}><div style={{fontSize:14,fontWeight:700,marginBottom:12}}>Resultado do teste</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}><Field label="Distancia (m)"><input style={INP} value={dist} onChange={e=>setDist(e.target.value)} inputMode="numeric" placeholder="2000"/></Field><Field label="Tempo (mm)"><input style={INP} value={mm} onChange={e=>setMM(e.target.value)} inputMode="numeric" placeholder="7"/></Field><Field label="Tempo (ss)"><input style={INP} value={ss} onChange={e=>setSS(e.target.value)} inputMode="numeric" placeholder="30"/></Field></div><div style={{fontSize:12,fontWeight:600,textTransform:"uppercase",color:"#aaa",marginBottom:8}}>Melhora alvo</div><div style={{display:"flex",gap:6,marginBottom:10}}><button onClick={()=>setAlvoTipo("pct")} style={{flex:1,padding:"9px 0",fontSize:13,borderRadius:10,border:"none",background:alvoTipo==="pct"?"#1a1a1a":"#f0f0ee",color:alvoTipo==="pct"?"#fff":"#888",cursor:"pointer"}}>Por %</button><button onClick={()=>setAlvoTipo("tempo")} style={{flex:1,padding:"9px 0",fontSize:13,borderRadius:10,border:"none",background:alvoTipo==="tempo"?"#1a1a1a":"#f0f0ee",color:alvoTipo==="tempo"?"#fff":"#888",cursor:"pointer"}}>Por tempo</button></div>{alvoTipo==="pct"&&<div style={{display:"flex",alignItems:"center",gap:10}}><input style={{...INP,width:80,textAlign:"center"}} value={pct} onChange={e=>setPct(e.target.value)} inputMode="numeric" placeholder="5"/><span style={{fontSize:14,color:"#888"}}>% de melhora</span></div>}{alvoTipo==="tempo"&&<div style={{display:"flex",gap:8,alignItems:"center"}}><input style={{...INP,width:70,textAlign:"center"}} value={alvoMM} onChange={e=>setAlvoMM(e.target.value)} inputMode="numeric" placeholder="mm"/><span style={{color:"#888"}}>:</span><input style={{...INP,width:70,textAlign:"center"}} value={alvoSS} onChange={e=>setAlvoSS(e.target.value)} inputMode="numeric" placeholder="ss"/><span style={{fontSize:13,color:"#888"}}>tempo alvo</span></div>}</div>{basePace500>0&&alvo>0&&(<div style={CARD}><div style={{fontSize:14,fontWeight:700,marginBottom:12}}>{modo==="ski"?"SkiErg":"Remo"} — Pace/500m</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}><div style={{background:"#f5f5f3",borderRadius:10,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:11,color:"#888"}}>Atual</div><div style={{fontSize:26,fontWeight:700}}>{fmtMMSS(Math.round(basePace500))}</div></div><div style={{background:"#edf7f2",border:"1px solid #b5dcc7",borderRadius:10,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:11,color:"#2a7a4b"}}>Alvo</div><div style={{fontSize:26,fontWeight:700,color:"#2a7a4b"}}>{fmtMMSS(Math.round(alvo))}</div></div></div><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr>{["Duracao","Dist Atual","Dist Alvo"].map(h=><th key={h} style={{textAlign:"left",padding:"5px 6px",color:"#888",fontWeight:600,fontSize:11,borderBottom:"1px solid #f0f0ee"}}>{h}</th>)}</tr></thead><tbody>{PACE_DUR.map(t=>{const dA=Math.round(t.sec/basePace500*500);const dAl=Math.round(t.sec/alvo*500);return(<tr key={t.sec} style={{borderBottom:"1px solid #f8f8f6"}}><td style={{padding:"6px 6px",fontWeight:500}}>{t.label}</td><td style={{padding:"6px 6px",color:"#555"}}>{dA}m</td><td style={{padding:"6px 6px",color:"#2a7a4b",fontWeight:600}}>{dAl}m</td></tr>);})}</tbody></table></div>)}</div>)}
    {modo==="assault"&&(<div><div style={CARD}><div style={{fontSize:14,fontWeight:700,marginBottom:4}}>Assault Bike</div><div style={{fontSize:12,color:"#888",marginBottom:12}}>Tempo para atingir X calorias</div><Field label="Calorias realizadas"><input style={INP} value={abCal} onChange={e=>setAbCal(e.target.value)} inputMode="numeric" placeholder="50"/></Field><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><Field label="Tempo (mm)"><input style={INP} value={abMM} onChange={e=>setAbMM(e.target.value)} inputMode="numeric" placeholder="1"/></Field><Field label="Tempo (ss)"><input style={INP} value={abSS} onChange={e=>setAbSS(e.target.value)} inputMode="numeric" placeholder="45"/></Field></div><div style={{fontSize:12,fontWeight:600,textTransform:"uppercase",color:"#aaa",marginBottom:8}}>Melhora alvo</div><div style={{display:"flex",gap:6,marginBottom:10}}><button onClick={()=>setAbAlvoTipo("pct")} style={{flex:1,padding:"9px 0",fontSize:13,borderRadius:10,border:"none",background:abAlvoTipo==="pct"?"#1a1a1a":"#f0f0ee",color:abAlvoTipo==="pct"?"#fff":"#888",cursor:"pointer"}}>Por %</button><button onClick={()=>setAbAlvoTipo("tempo")} style={{flex:1,padding:"9px 0",fontSize:13,borderRadius:10,border:"none",background:abAlvoTipo==="tempo"?"#1a1a1a":"#f0f0ee",color:abAlvoTipo==="tempo"?"#fff":"#888",cursor:"pointer"}}>Por tempo</button></div>{abAlvoTipo==="pct"&&<div style={{display:"flex",alignItems:"center",gap:10}}><input style={{...INP,width:80,textAlign:"center"}} value={abPct} onChange={e=>setAbPct(e.target.value)} inputMode="numeric" placeholder="5"/><span style={{fontSize:14,color:"#888"}}>% de melhora</span></div>}{abAlvoTipo==="tempo"&&<div style={{display:"flex",gap:8,alignItems:"center"}}><input style={{...INP,width:70,textAlign:"center"}} value={abAlvoMM} onChange={e=>setAbAlvoMM(e.target.value)} inputMode="numeric" placeholder="mm"/><span style={{color:"#888"}}>:</span><input style={{...INP,width:70,textAlign:"center"}} value={abAlvoSS} onChange={e=>setAbAlvoSS(e.target.value)} inputMode="numeric" placeholder="ss"/><span style={{fontSize:13,color:"#888"}}>tempo alvo</span></div>}</div>{abSec>0&&abCPM>0&&(<div style={CARD}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}><div style={{background:"#f5f5f3",borderRadius:10,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:11,color:"#888"}}>Atual</div><div style={{fontSize:24,fontWeight:700}}>{abCPM.toFixed(1)}</div><div style={{fontSize:11,color:"#888"}}>{abTargetCal}cal em {fmtMMSS(abSec)}</div></div><div style={{background:"#edf7f2",border:"1px solid #b5dcc7",borderRadius:10,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:11,color:"#2a7a4b"}}>Alvo</div><div style={{fontSize:24,fontWeight:700,color:"#2a7a4b"}}>{abCPMAlvo.toFixed(1)}</div><div style={{fontSize:11,color:"#2a7a4b"}}>{abTargetCal}cal em {fmtMMSS(Math.round(abAlvoSecFinal))}</div></div></div><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr>{["Duracao","Atual","Alvo"].map(h=><th key={h} style={{textAlign:"left",padding:"5px 6px",color:"#888",fontWeight:600,fontSize:11,borderBottom:"1px solid #f0f0ee"}}>{h}</th>)}</tr></thead><tbody>{[{l:"30s",s:30},{l:"45s",s:45},{l:"1 min",s:60},{l:"2 min",s:120},{l:"4 min",s:240},{l:"6 min",s:360},{l:"8 min",s:480},{l:"10 min",s:600},{l:"12 min",s:720}].map(t=>(<tr key={t.s} style={{borderBottom:"1px solid #f8f8f6"}}><td style={{padding:"5px 6px",fontWeight:500}}>{t.l}</td><td style={{padding:"5px 6px",color:"#555"}}>{Math.round(abCPM*(t.s/60))}</td><td style={{padding:"5px 6px",color:"#2a7a4b",fontWeight:600}}>{Math.round(abCPMAlvo*(t.s/60))}</td></tr>))}</tbody></table></div>)}</div>)}
  </div>);
}

const TABS=[{id:"treinos",label:"Treinos",icon:"📋"},{id:"prs",label:"PRs",icon:"🏆"},{id:"progresso",label:"Progresso",icon:"📈"},{id:"hyrox",label:"Hyrox",icon:"⚡"},{id:"pace",label:"Pace",icon:"🎯"}];

function App(){
  const[db,update,loaded]=useDB();const[modo,entrar,sair]=useModo();const[tab,setTab]=useState("treinos");const isCoach=modo==="coach";
  if(!loaded)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontSize:16,color:"#888"}}>Carregando...</div>);
  return(<div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column"}}>
    <div style={{position:"sticky",top:0,zIndex:100,background:"#fff",borderBottom:"1px solid #e8e8e5",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{fontSize:18,fontWeight:800,letterSpacing:"-0.5px"}}>Coach RX</div><BotaoModo modo={modo} entrar={entrar} sair={sair}/></div>
    <div style={{flex:1,padding:"16px 14px 100px"}}>
      {tab==="treinos"&&<TreinosTab db={db} update={update} isCoach={isCoach}/>}
      {tab==="prs"&&<PRsTab db={db} update={update}/>}
      {tab==="progresso"&&<ProgressoTab db={db}/>}
      {tab==="hyrox"&&<HyroxTab/>}
      {tab==="pace"&&<PaceTab/>}
    </div>
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:"1px solid #e8e8e5",display:"flex",zIndex:100}}>
      {TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 4px 14px",border:"none",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><span style={{fontSize:18}}>{t.icon}</span><span style={{fontSize:10,color:tab===t.id?"#1a1a1a":"#bbb",fontWeight:tab===t.id?700:400}}>{t.label}</span>{tab===t.id&&<div style={{width:20,height:2,background:"#1a1a1a",borderRadius:1,marginTop:1}}/>}</button>))}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
