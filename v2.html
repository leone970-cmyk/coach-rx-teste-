function LoginScreen(){
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);

  const doLogin=async()=>{
    if(!email.trim()||!pass){setErr("Preencha email e senha");return;}
    setLoading(true);setErr("");
    try{await fbAuth.signInWithEmailAndPassword(email.trim(),pass);}
    catch(e){
      if(e.code==="auth/user-not-found"||e.code==="auth/wrong-password"||e.code==="auth/invalid-credential")setErr("Email ou senha incorretos");
      else if(e.code==="auth/invalid-api-key"||e.code==="auth/api-key-not-valid")setErr("⚠️ Configure o Firebase no código antes de usar");
      else setErr("Erro: "+e.message);
    }
    setLoading(false);
  };

  const doGoogle=async()=>{
    setLoading(true);setErr("");
    try{await fbAuth.signInWithPopup(googleProvider);}
    catch(e){
      if(e.code==="auth/invalid-api-key"||e.code==="auth/api-key-not-valid")setErr("⚠️ Configure o Firebase no código");
      else setErr("Erro ao entrar com Google");
    }

function useDB(){
  const[data,setData]=useState(null);
  useEffect(()=>{
    try{
      const s=localStorage.getItem("coachRxDB");
      const p=s?JSON.parse(s):null;
      const m={...SEED,...(p||{})};
      m.sessoes=m.sessoes||{};m.done=m.done||{};m.prs=m.prs||{};
      setData(m);
    }catch{setData({...SEED,sessoes:{},done:{},prs:{}});}
  },[]);
  const update=useCallback(fn=>{
    setData(prev=>{
      const next=JSON.parse(JSON.stringify(prev));fn(next);
      try{localStorage.setItem("coachRxDB",JSON.stringify(next));}catch{}
      return next;
    });
  },[]);
  return[data,update,!!data];
}

  return(<div>{db.alunos.map(a=>{const sems=db.semanas[a.id]||[];let te=0,de=0;sems.forEach(s=>(db.dias[s.id]||[]).forEach(d=>{const sss=db.sessoes[d.id]||[];te+=sss.length;de+=sss.filter(ss=>db.done[`ss_done_${ss.id}`]).length;}));return(<div key={a.id} style={{...CARD,padding:0,overflow:"hidden"}}><div style={{padding:"14px 16px",borderBottom:"1px solid #f2f2f0"}}><div style={{fontSize:16,fontWeight:700}}>{a.nome}</div>{a.objetivo&&<div style={{fontSize:13,color:"#888",marginTop:2}}>Objetivo: {a.objetivo}</div>}</div><div style={{padding:"14px 16px"}}><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>{[{n:sems.length,l:"Semanas"},{n:te,l:"Sessoes"},{n:te?Math.round((de/te)*100)+"%":"0%",l:"Concluido"}].map(s=><div key={s.l} style={{background:"#f5f5f3",borderRadius:10,padding:10,textAlign:"center"}}><div style={{fontSize:24,fontWeight:700}}>{s.n}</div><div style={{fontSize:11,color:"#888",marginTop:2}}>{s.l}</div></div>)}</div>{sems.map(s=>{let st=0,sd=0;(db.dias[s.id]||[]).forEach(d=>{const sss=db.sessoes[d.id]||[];st+=sss.length;sd+=sss.filter(ss=>db.done[`ss_done_${ss.id}`]).length;});return(<div key={s.id} style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",fontSize:14,marginBottom:5}}><span style={{fontWeight:600}}>{s.nome}</span><span style={{color:"#888"}}>{sd}/{st}</span></div><div style={{height:5,background:"#f0f0ee",borderRadius:99}}><div style={{height:"100%",width:st?`${Math.round(sd/st*100)}%`:"0%",background:"#2a7a4b",borderRadius:99,transition:"width .3s"}}/></div></div>);})}</div></div>);})}</div>);
}

const ESTACOES=[{id:"ski",nome:"SkiErg",dist:"1000m",icone:"⛷"},{id:"sled_push",nome:"Sled Push",dist:"50m",icone:"🛷"},{id:"sled_pull",nome:"Sled Pull",dist:"50m",icone:"🔗"},{id:"burpee",nome:"Burpee Broad Jump",dist:"80m",icone:"🏃"},{id:"row",nome:"Rowing",dist:"1000m",icone:"🚣"},{id:"farmers",nome:"Farmer's Carry",dist:"200m",icone:"💪"},{id:"lunge",nome:"Sandbag Lunge",dist:"100m",icone:"🎒"},{id:"wallball",nome:"Wall Ball",dist:"100 reps",icone:"🏀"}];
function HyroxTab(){
  const KEY="hyroxM10";const[data,setData]=useState(()=>{try{const s=localStorage.getItem(KEY);return s?JSON.parse(s):{};}catch{return{};}});const[edit,setEdit]=useState(null);const[mm,setMM]=useState("");const[ss,setSS]=useState("");
  const save=id=>{const sec=toSec(mm,ss);if(!sec)return;const n={...data,[id]:{tempo:sec}};setData(n);try{localStorage.setItem(KEY,JSON.stringify(n));}catch{}setEdit(null);setMM("");setSS("");};
  const total=Object.values(data).reduce((a,v)=>a+(v?.tempo||0),0);
  return(<div><div style={{...CARD,background:"#1a1a1a",color:"#fff",textAlign:"center",padding:"20px 16px"}}><div style={{fontSize:11,color:"#666",marginBottom:4,textTransform:"uppercase",letterSpacing:".1em"}}>Tempo Total Estimado</div><div style={{fontSize:42,fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{fmtMMSS(total)}</div><div style={{fontSize:12,color:"#555",marginTop:4}}>{Object.keys(data).length}/8 estacoes</div></div>{ESTACOES.map(e=>{const sec=data[e.id]?.tempo||0;return(<div key={e.id} style={{...CARD,display:"flex",alignItems:"center",gap:12,padding:"12px 14px"}}><div style={{fontSize:28,width:40,textAlign:"center"}}>{e.icone}</div><div style={{flex:1}}><div style={{fontSize:14,fontWeight:600}}>{e.nome}</div><div style={{fontSize:11,color:"#888"}}>{e.dist}</div>{sec>0&&<div style={{fontSize:14,color:"#2a7a4b",fontWeight:700,marginTop:2}}>{fmtMMSS(sec)}</div>}</div>{edit===e.id?(<div style={{display:"flex",gap:4,alignItems:"center"}}><input value={mm} onChange={x=>setMM(x.target.value)} placeholder="mm" inputMode="numeric" style={{...INP,width:48,textAlign:"center",fontSize:14,padding:"6px 8px"}}/><span>:</span><input value={ss} onChange={x=>setSS(x.target.value)} placeholder="ss" inputMode="numeric" style={{...INP,width:48,textAlign:"center",fontSize:14,padding:"6px 8px"}}/><button onClick={()=>save(e.id)} style={{padding:"7px 12px",fontSize:13,borderRadius:8,border:"none",background:"#1a1a1a",color:"#fff",cursor:"pointer"}}>OK</button></div>):(<button onClick={()=>{setEdit(e.id);if(sec){setMM(String(Math.floor(sec/60)));setSS(String(sec%60));}}} style={{padding:"7px 14px",fontSize:13,borderRadius:8,border:"1px solid #e8e8e5",background:"#fff",color:"#1a1a1a",cursor:"pointer",whiteSpace:"nowrap"}}>{sec>0?"Editar":"+ Tempo"}</button>)}</div>);})}</div>);
}

// =============================================
// PACE TAB
// =============================================
const PACE_DUR=[{label:"12 min",sec:720},{label:"10 min",sec:600},{label:"8 min",sec:480},{label:"6 min",sec:360},{label:"4 min",sec:240},{label:"3 min",sec:180},{label:"2 min",sec:120},{label:"1m30",sec:90},{label:"1 min",sec:60},{label:"45s",sec:45},{label:"30s",sec:30},{label:"15s",sec:15}];
function PaceTab(){
  const[modo,setModo]=useState("remo");const[mm,setMM]=useState("");const[ss,setSS]=useState("");const[dist,setDist]=useState("");const[alvoTipo,setAlvoTipo]=useState("pct");const[pct,setPct]=useState("5");const[alvoMM,setAlvoMM]=useState("");const[alvoSS,setAlvoSS]=useState("");const[abCal,setAbCal]=useState("");const[abMM,setAbMM]=useState("");const[abSS,setAbSS]=useState("");const[abAlvoTipo,setAbAlvoTipo]=useState("pct");const[abPct,setAbPct]=useState("5");const[abAlvoMM,setAbAlvoMM]=useState("");const[abAlvoSS,setAbAlvoSS]=useState("");
  const baseSec=toSec(mm,ss);const baseDistM=parseInt(dist)||0;const basePace500=baseSec&&baseDistM?(baseSec/(baseDistM/500)):0;const alvoSec2=alvoTipo==="tempo"?toSec(alvoMM,alvoSS):0;const alvo=basePace500>0?(alvoSec2>0?(alvoSec2/(baseDistM/500)):basePace500*(1-parseInt(pct||0)/100)):0;const abSec=toSec(abMM,abSS);const abTargetCal=parseInt(abCal)||0;const abCPM=abSec&&abTargetCal?(abTargetCal/(abSec/60)):0;const abAlvoSec2=abAlvoTipo==="tempo"?toSec(abAlvoMM,abAlvoSS):0;const abCPMAlvo=abCPM>0?(abAlvoSec2>0?(abTargetCal/(abAlvoSec2/60)):abCPM*(1+parseInt(abPct||0)/100)):0;const abAlvoSecFinal=abCPMAlvo?(abTargetCal/abCPMAlvo)*60:0;
  return(<div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>{[{id:"remo",l:"Remo"},{id:"ski",l:"SkiErg"},{id:"assault",l:"Assault Bike"}].map(m=><Pill key={m.id} label={m.l} active={modo===m.id} onClick={()=>setModo(m.id)}/>)}</div>
    {(modo==="remo"||modo==="ski")&&<div><div style={CARD}><div style={{fontSize:14,fontWeight:700,marginBottom:12}}>Resultado do teste</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}><Field label="Distancia (m)"><input style={INP} value={dist} onChange={e=>setDist(e.target.value)} inputMode="numeric" placeholder="2000"/></Field><Field label="Tempo (mm)"><input style={INP} value={mm} onChange={e=>setMM(e.target.value)} inputMode="numeric" placeholder="7"/></Field><Field label="Tempo (ss)"><input style={INP} value={ss} onChange={e=>setSS(e.target.value)} inputMode="numeric" placeholder="30"/></Field></div><div style={{fontSize:12,fontWeight:600,textTransform:"uppercase",color:"#aaa",marginBottom:8}}>Melhora alvo</div><div style={{display:"flex",gap:6,marginBottom:10}}><button onClick={()=>setAlvoTipo("pct")} style={{flex:1,padding:"9px 0",fontSize:13,borderRadius:10,border:"none",background:alvoTipo==="pct"?"#1a1a1a":"#f0f0ee",color:alvoTipo==="pct"?"#fff":"#888",cursor:"pointer"}}>Por %</button><button onClick={()=>setAlvoTipo("tempo")} style={{flex:1,padding:"9px 0",fontSize:13,borderRadius:10,border:"none",background:alvoTipo==="tempo"?"#1a1a1a":"#f0f0ee",color:alvoTipo==="tempo"?"#fff":"#888",cursor:"pointer"}}>Por tempo</button></div>{alvoTipo==="pct"&&<div style={{display:"flex",alignItems:"center",gap:10}}><input style={{...INP,width:80,textAlign:"center"}} value={pct} onChange={e=>setPct(e.target.value)} inputMode="numeric" placeholder="5"/><span style={{fontSize:14,color:"#888"}}>% de melhora</span></div>}{alvoTipo==="tempo"&&<div style={{display:"flex",gap:8,alignItems:"center"}}><input style={{...INP,width:70,textAlign:"center"}} value={alvoMM} onChange={e=>setAlvoMM(e.target.value)} inputMode="numeric" placeholder="mm"/><span>:</span><input style={{...INP,width:70,textAlign:"center"}} value={alvoSS} onChange={e=>setAlvoSS(e.target.value)} inputMode="numeric" placeholder="ss"/></div>}</div>{basePace500>0&&alvo>0&&<div style={CARD}><div style={{fontSize:14,fontWeight:700,marginBottom:12}}>{modo==="ski"?"SkiErg":"Remo"} — Pace/500m</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}><div style={{background:"#f5f5f3",borderRadius:10,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:11,color:"#888"}}>Atual</div><div style={{fontSize:26,fontWeight:700}}>{fmtMMSS(Math.round(basePace500))}</div></div><div style={{background:"#edf7f2",border:"1px solid #b5dcc7",borderRadius:10,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:11,color:"#2a7a4b"}}>Alvo</div><div style={{fontSize:26,fontWeight:700,color:"#2a7a4b"}}>{fmtMMSS(Math.round(alvo))}</div></div></div><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr>{["Duracao","Dist Atual","Dist Alvo"].map(h=><th key={h} style={{textAlign:"left",padding:"5px 6px",color:"#888",fontWeight:600,fontSize:11,borderBottom:"1px solid #f0f0ee"}}>{h}</th>)}</tr></thead><tbody>{PACE_DUR.map(t=>{const dA=Math.round(t.sec/basePace500*500);const dAl=Math.round(t.sec/alvo*500);return(<tr key={t.sec} style={{borderBottom:"1px solid #f8f8f6"}}><td style={{padding:"6px 6px",fontWeight:500}}>{t.label}</td><td style={{padding:"6px 6px",color:"#555"}}>{dA}m</td><td style={{padding:"6px 6px",color:"#2a7a4b",fontWeight:600}}>{dAl}m</td></tr>);})}</tbody></table></div>}</div>}
    {modo==="assault"&&<div><div style={CARD}><div style={{fontSize:14,fontWeight:700,marginBottom:4}}>Assault Bike</div><div style={{fontSize:12,color:"#888",marginBottom:12}}>Tempo para atingir X calorias</div><Field label="Calorias realizadas"><input style={INP} value={abCal} onChange={e=>setAbCal(e.target.value)} inputMode="numeric" placeholder="50"/></Field><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><Field label="Tempo (mm)"><input style={INP} value={abMM} onChange={e=>setAbMM(e.target.value)} inputMode="numeric" placeholder="1"/></Field><Field label="Tempo (ss)"><input style={INP} value={abSS} onChange={e=>setAbSS(e.target.value)} inputMode="numeric" placeholder="45"/></Field></div></div></div>}
  </div>);
}

// =============================================
// VIDEOS TAB
// =============================================
function VideosTab({cats}){
  const KEY="coachVideosDB";
  const[videos,setVideos]=useState(()=>{try{return JSON.parse(localStorage.getItem(KEY)||"[]");}catch{return[];}});
  const[open,setOpen]=useState(false);const[form,setForm]=useState({nome:"",cat:cats[0]||"",url:"",desc:""});const[filtro,setFiltro]=useState("Todos");
  const save=()=>{if(!form.nome||!form.url)return;const n=[...videos,{id:uid(),...form,ts:Date.now()}];setVideos(n);localStorage.setItem(KEY,JSON.stringify(n));setOpen(false);setForm({nome:"",cat:cats[0]||"",url:"",desc:""});};
  const del=id=>{const n=videos.filter(v=>v.id!==id);setVideos(n);localStorage.setItem(KEY,JSON.stringify(n));};
  const thumb=url=>{const m=url.match(/(?:youtu\.be\/|v=|embed\/)([A-Za-z0-9_-]{11})/);return m?`https://img.youtube.com/vi/${m[1]}/mqdefault.jpg`:null;};
  const list=filtro==="Todos"?videos:videos.filter(v=>v.cat===filtro);
  return(<div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>{["Todos",...cats].map(c=><Pill key={c} label={c} active={filtro===c} onClick={()=>setFiltro(c)}/>)}</div>
    <button onClick={()=>setOpen(true)} style={{width:"100%",padding:"12px",borderRadius:12,border:"2px dashed #e0e0dc",background:"transparent",color:"#888",fontSize:14,cursor:"pointer",marginBottom:16,fontWeight:500}}>+ Adicionar vídeo</button>
    {list.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"#bbb"}}><div style={{fontSize:44,marginBottom:12}}>🎥</div><div style={{fontSize:14,fontWeight:600}}>Nenhum vídeo ainda</div><div style={{fontSize:12,marginTop:4}}>Adicione links do YouTube dos exercícios</div></div>}
    {list.map(v=>{const t=thumb(v.url);return(<div key={v.id} className="vcardx">
      <div className="vthumb">{t?<img src={t} alt=""/>:<span>🎥</span>}</div>
      <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:"#1a1a1a"}}>{v.nome}</div><div style={{fontSize:11,color:"#999",marginTop:2}}>{v.cat}{v.desc&&" · "+v.desc}</div></div>
      <button className="vplay" onClick={()=>window.open(v.url,"_blank")}>▶</button>
      <button onClick={()=>del(v.id)} style={{background:"none",border:"none",color:"#ddd",cursor:"pointer",fontSize:18,padding:"0 2px"}}>×</button>
    </div>);})}
    <Sheet open={open} onClose={()=>setOpen(false)} title="Novo Vídeo">
      <Field label="Nome do exercicio"><input style={INP} value={form.nome} onChange={e=>setForm(f=>({...f,nome:e.target.value}))} placeholder="Ex: Sandbag Lunge tecnica"/></Field>
      <Field label="Categoria"><select style={INP} value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))}>{cats.map(c=><option key={c}>{c}</option>)}</select></Field>
      <Field label="Link YouTube"><input style={INP} value={form.url} onChange={e=>setForm(f=>({...f,url:e.target.value}))} placeholder="https://youtube.com/watch?v=..."/></Field>
      <Field label="Descricao (opcional)"><input style={INP} value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} placeholder="Dica tecnica..."/></Field>
      <div style={{display:"flex",gap:8}}><button style={BTNCANCEL} onClick={()=>setOpen(false)}>Cancelar</button><button style={BTNOK} onClick={save}>Salvar</button></div>
    </Sheet>
  </div>);
}

// =============================================
// APP HYROX
// =============================================
const TABS_H=[{id:"treinos",label:"Treinos",icon:"📋"},{id:"prs",label:"PRs",icon:"🏆"},{id:"progresso",label:"Progresso",icon:"📈"},{id:"hyrox",label:"Hyrox",icon:"⚡"},{id:"pace",label:"Pace",icon:"🎯"},{id:"videos",label:"Vídeos",icon:"🎥"}];
const VCATS_H=["SkiErg","Sled Push","Sled Pull","Burpee Broad Jump","Rowing","Farmer's Carry","Sandbag Lunge","Wall Ball","Forca","Corrida","Mobilidade"];

function AppHyrox({onBack}){
  const[db,update,loaded]=useDB();const[modo,entrar,sair]=useModo();const[tab,setTab]=useState("treinos");
  if(!loaded)return(<div className="app-wrap"><div style={{display:"flex",alignItems:"center",justifyContent:"center",flex:1,color:"#888",fontSize:14}}>Carregando...</div></div>);
  return(<div className="app-wrap">
    <div className="app-hdr"><button className="app-back" onClick={onBack}>‹</button><div className="app-title">⚡ HYROX</div><BotaoModo modo={modo} entrar={entrar} sair={sair}/></div>
    <div className="app-body">
      {tab==="treinos"&&<TreinosTab db={db} update={update} isCoach={modo==="coach"}/>}
      {tab==="prs"&&<PRsTab db={db} update={update}/>}
      {tab==="progresso"&&<ProgressoTab db={db}/>}
      {tab==="hyrox"&&<HyroxTab/>}
      {tab==="pace"&&<PaceTab/>}
      {tab==="videos"&&<VideosTab cats={VCATS_H}/>}

  </div>);
}

// =============================================
// APP CORRIDA

const TABS_C=[{id:"treinos",label:"Treinos",icon:"📋"},{id:"prs",label:"PRs",icon:"🏆"},{id:"pace",label:"Pace",icon:"🎯"},{id:"videos",label:"Vídeos",icon:"🎥"}];

// EM BREVE
// =============================================
function AppEmBreve({modal,onBack}){
  return(<div style={{minHeight:"100vh",background:"#0a0a0a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,position:"relative"}}>

// =============================================
// ROOT
// =============================================
function App(){
  const[user,setUser]=useState(undefined);
  const[modal,setModal]=useState(null);

  useEffect(()=>{
    const unsub=fbAuth.onAuthStateChanged(u=>setUser(u||null));
    return unsub;
  },[]);

  if(user===undefined){
    return(<div className="loading">
      <div style={{fontSize:22,fontWeight:900,letterSpacing:"-1px"}}>Coach<span style={{color:"#00e676"}}>RX</span></div>
      <div style={{width:6,height:6,borderRadius:"50%",background:"#00e676",animation:"pulse 1s ease infinite"}}/>
    </div>);
  }

  if(!user)return <LoginScreen/>;

  if(modal){
    if(modal==="hyrox")return <AppHyrox onBack={()=>setModal(null)}/>;
    if(modal==="corrida")return <AppCorrida onBack={()=>setModal(null)}/>;
    const m=MODALS.find(x=>x.id===modal);
    return <AppEmBreve modal={m} onBack={()=>setModal(null)}/>;
  }

  return <Dashboard user={user} onSelect={setModal} onSignOut={()=>{fbAuth.signOut();setModal(null);}}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
